name: Web

on:
  pull_request:
    branches:
      - main
    paths:
      - apps/web/**
      - package.json
      - bun.lock
      - turbo.json
      - .github/workflows/web.yml
  push:
    branches:
      - main
    paths:
      - apps/web/**
      - package.json
      - bun.lock
      - turbo.json
      - .github/workflows/web.yml

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        working-directory: apps/web

      - name: Build
        run: bun run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ci
          NEXT_PUBLIC_FIREBASE_APP_ID: ci
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ci
